<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cockpit - Le Coup de Main</title>
    <style>
        :root {
            --blue: #004a99;
            --orange: #ff6600;
            --dark: #2c3e50;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--orange); padding-bottom: 10px; }
        .logo-text { color: var(--blue); font-weight: bold; font-size: 1.6rem; text-transform: uppercase; margin: 0; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px; margin: auto; }
        
        .card {
            background: white; border-radius: 12px; padding: 15px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.2s;
        }
        .card:active { transform: scale(0.95); background: #f0f0f0; }
        .card-icon { font-size: 2.2rem; margin-bottom: 8px; }
        .card-title { color: var(--blue); font-weight: bold; font-size: 0.9rem; text-align: center; }

        .full-width { grid-column: span 2; }
        .orange-btn { background: var(--orange); border: none; }
        .orange-btn .card-title { color: white; font-size: 1.1rem; }
        
        .blue-btn { background: var(--blue); border: none; }
        .blue-btn .card-title { color: white; }

        .section-title { grid-column: span 2; color: var(--dark); font-size: 0.8rem; text-transform: uppercase; margin-top: 15px; font-weight: bold; border-left: 4px solid var(--orange); padding-left: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1 class="logo-text">LE COUP DE MAIN</h1>
</div>

<div class="grid">
    <a href="https://docs.google.com/document/d/1vySFylIgzjzXcbOyi05-UWVQBuN8Ap33or4NcBjmlR4/copy" class="card full-width orange-btn">
        <span class="card-icon">📋</span>
        <span class="card-title">LANCER UN CONTRÔLE TECHNIQUE</span>
    </a>

    <a href="https://app.renalto.fr/" target="_blank" class="card full-width blue-btn">
        <span class="card-icon">💶</span>
        <span class="card-title">RENALTO : DEVIS & FACTURES</span>
    </a>

    <div class="section-title">Outils & Références</div>
    <a href="https://lens.google.com/search?p" target="_blank" class="card">
        <span class="card-icon">📸</span>
        <span class="card-title">SCAN PIÈCE</span>
    </a>
    <a href="https://photos.google.com/" target="_blank" class="card">
        <span class="card-icon">🖼️</span>
        <span class="card-title">PHOTOS CHANTIER</span>
    </a>

    <div class="section-title">Fournisseurs Pros</div>
    <a href="https://www.foussier.fr" target="_blank" class="card">
        <span class="card-icon">🛠️</span>
        <span class="card-title">FOUSSIER</span>
    </a>
    <a href="https://www.sanisitt.fr" target="_blank" class="card">
        <span class="card-icon">🚿</span>
        <span class="card-title">SANISITT</span>
    </a>
    <a href="https://www.bardahl.fr" target="_blank" class="card">
        <span class="card-icon">🧴</span>
        <span class="card-title">BARDAHL</span>
    </a>
    <a href="https://www.legrand.fr" target="_blank" class="card">
        <span class="card-icon">⚡</span>
        <span class="card-title">LEGRAND</span>
    </a>

    <div class="section-title">Navigation</div>
    <a href="https://www.google.com/maps" target="_blank" class="card full-width">
        <span class="card-icon">📍</span>
        <span class="card-title">GPS / TRAJET</span>
    </a>
</div>

<div style="text-align: center; margin-top: 30px; color: #bbb; font-size: 0.7rem;">
    Dashboard Officiel - Julien / Le Coup de Main Services
</div>

</body>
</html>
