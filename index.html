<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cockpit Neneche</title>
    <style>
        :root { --blue: #004a99; --orange: #ff6600; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header { text-align: center; padding: 10px; border-bottom: 3px solid var(--orange); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px; margin: auto; }
        .card {
            border-radius: 12px; text-decoration: none; display: flex; align-items: center; 
            justify-content: center; height: 100px; position: relative; overflow: hidden;
            background-color: #333; background-size: cover; background-position: center;
        }
        .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); }
        .card-title { color: white; font-weight: bold; font-size: 0.9rem; z-index: 2; text-align: center; padding: 5px; }
        .full { grid-column: span 2; height: 120px; }
        .label { grid-column: span 2; color: var(--blue); font-size: 0.8rem; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="color: var(--blue); margin: 0;">LE COUP DE MAIN</h2>
</div>

<div class="grid">
    <div class="label">Facturation</div>
    <a href="https://docs.google.com/document/d/1vySFylIgzjzXcbOyi05-UWVQBuN8Ap33or4NcBjmlR4/copy" class="card full" style="background-image: url('ct.jpg');">
        <span class="card-title">LANCER UN CONTRÔLE TECHNIQUE</span>
    </a>
    <a href="https://app.renalto.com/" target="_blank" class="card full" style="background-image: url('renalto.jpg');">
        <span class="card-title">DEVIS & FACTURES (RENALTO)</span>
    </a>

    <div class="label">Outils</div>
    <a href="https://lens.google.com/search?p" target="_blank" class="card">
        <span class="card-title">SCAN PIÈCE (LENS)</span>
    </a>
    <a href="https://photos.google.com" target="_blank" class="card">
        <span class="card-title">PHOTOS CHANTIER</span>
    </a>

    <div class="label">Logistique</div>
    <a href="https://docs.google.com/spreadsheets/d/1lh0e45ou-8iVFABTsIIp06hQqdnl8AjoVSBW1VN6Hig/edit?usp=drivesdk" target="_blank" class="card" style="background-image: url('annuaire.jpg');">
        <span class="card-title">ANNUAIRE CLIENTS</span>
    </a>
    <a href="https://docs.google.com/spreadsheets/d/1urUAzTX7GhDhfIDyouId4CyP3MWMkzrZJ92Pqj3C5mE/edit?usp=drivesdk" target="_blank" class="card" style="background-image: url('inventaire.jpg');">
        <span class="card-title">INVENTAIRE NENECHE</span>
    </a>
</div>

</body>
</html>
